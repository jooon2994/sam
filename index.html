
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

#app {
  min-height: 100vh;
  min-height: 100dvh;
  background: #1a1008;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: clamp(1.5rem, 6vw, 3rem) clamp(1rem, 5vw, 2rem);
  position: relative;
  overflow: hidden;
  font-family: var(--font-sans);
}

.stars span {
  position: absolute;
  border-radius: 50%;
  background: #f5d78e;
  opacity: 0;
  animation: twinkle 3s infinite;
}
@keyframes twinkle { 0%,100%{opacity:0} 50%{opacity:0.7} }

.vinyl {
  width: clamp(90px, 28vw, 130px);
  height: clamp(90px, 28vw, 130px);
  border-radius: 50%;
  background: #111;
  border: 3px solid #3a2a10;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  animation: spin 8s linear infinite;
  margin-bottom: clamp(1rem, 4vw, 1.75rem);
  flex-shrink: 0;
}
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

.vinyl-inner {
  width: clamp(24px, 7vw, 34px);
  height: clamp(24px, 7vw, 34px);
  border-radius: 50%;
  background: #f5d78e;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 1;
}
.vinyl-inner::after {
  content: '';
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #1a1008;
}

.groove { position: absolute; border-radius: 50%; border: 0.5px solid #2a1f0a; }

.label-top {
  font-size: clamp(10px, 2.5vw, 13px);
  letter-spacing: 3px;
  color: #f5d78e;
  text-transform: uppercase;
  margin-bottom: clamp(0.4rem, 2vw, 0.6rem);
  opacity: 0.7;
  text-align: center;
}

.message {
  font-size: clamp(18px, 5.5vw, 24px);
  font-weight: 500;
  color: #f5d78e;
  text-align: center;
  line-height: 1.5;
  max-width: min(320px, 88vw);
  margin-bottom: clamp(0.4rem, 2vw, 0.6rem);
}

.sub {
  font-size: clamp(13px, 3.5vw, 15px);
  color: #9a7a3a;
  text-align: center;
  max-width: min(280px, 85vw);
  line-height: 1.75;
  margin-bottom: clamp(1.5rem, 5vw, 2.25rem);
}

.cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: clamp(12px, 3.5vw, 14px) clamp(22px, 7vw, 32px);
  background: #f5d78e;
  color: #1a1008;
  border: none;
  border-radius: 40px;
  font-size: clamp(14px, 3.8vw, 16px);
  font-weight: 500;
  cursor: pointer;
  text-decoration: none;
  font-family: var(--font-sans);
  transition: opacity 0.15s;
  white-space: nowrap;
}
.cta:hover { opacity: 0.88; }
.cta:active { opacity: 0.75; transform: scale(0.97); }
.cta i { font-size: clamp(16px, 4vw, 18px); }

.note {
  position: absolute;
  font-size: clamp(16px, 5vw, 22px);
  color: #f5d78e;
  opacity: 0;
  animation: floatNote 4s ease-in infinite;
  pointer-events: none;
  user-select: none;
}
@keyframes floatNote {
  0%   { opacity: 0; transform: translateY(0) rotate(-10deg); }
  20%  { opacity: 0.5; }
  80%  { opacity: 0.3; }
  100% { opacity: 0; transform: translateY(-80px) rotate(15deg); }
}
</style>

<div id="app">
  <div class="stars" id="stars"></div>

  <div class="note" style="left:8%;bottom:28%;animation-delay:0s">♪</div>
  <div class="note" style="left:74%;bottom:22%;animation-delay:1.2s">♫</div>
  <div class="note" style="left:52%;bottom:38%;animation-delay:2.4s">♩</div>
  <div class="note" style="left:22%;bottom:18%;animation-delay:0.8s">♬</div>
  <div class="note" style="left:82%;bottom:48%;animation-delay:3s">♪</div>

  <div class="vinyl">
    <div class="groove" style="width:88%;height:88%"></div>
    <div class="groove" style="width:68%;height:68%"></div>
    <div class="groove" style="width:52%;height:52%"></div>
    <div class="groove" style="width:38%;height:38%"></div>
    <div class="vinyl-inner"></div>
  </div>

  <p class="label-top">a note for you</p>
  <p class="message">Hey Samri,<br>how you doing? 😊</p>
  <p class="sub">Someone's been thinking about you.<br>Slide back when you're ready.</p>

  <a class="cta" href="https://ig.me/m/joh_n.a" target="_blank">
    <i class="ti ti-brand-instagram" aria-hidden="true"></i>
    Reply on Instagram
  </a>
</div>

<script>
const starsEl = document.getElementById('stars');
for (let i = 0; i < 35; i++) {
  const s = document.createElement('span');
  const size = 1 + Math.random() * 2.5;
  s.style.cssText = `width:${size}px;height:${size}px;left:${(Math.random()*100).toFixed(1)}%;top:${(Math.random()*100).toFixed(1)}%;animation-delay:${(Math.random()*3).toFixed(1)}s;animation-duration:${(2+Math.random()*3).toFixed(1)}s`;
  starsEl.appendChild(s);
}
</script>
